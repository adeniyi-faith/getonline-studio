<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 | Signal Lost</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Syne:wght@400;700;800&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'matte-black': '#101010',
                        'lavender': '#e9d5ff',
                        'sharp-purple': '#7e22ce',
                    },
                    fontFamily: {
                        'syne': ['Syne', 'sans-serif'],
                        'manrope': ['Manrope', 'sans-serif'],
                        'space': ['Space Grotesk', 'sans-serif'],
                    },
                    animation: {
                        'glitch': 'glitch 1s linear infinite',
                        'noise': 'noise 0.2s infinite',
                    },
                    keyframes: {
                        glitch: {
                            '2%, 64%': { transform: 'translate(2px,0) skew(0deg)' },
                            '4%, 60%': { transform: 'translate(-2px,0) skew(0deg)' },
                            '62%': { transform: 'translate(0,0) skew(5deg)' },
                        },
                        noise: {
                            '0%': { transform: 'translate(0,0)' },
                            '10%': { transform: 'translate(-5%,-5%)' },
                            '20%': { transform: 'translate(-10%,5%)' },
                            '30%': { transform: 'translate(5%,-10%)' },
                            '40%': { transform: 'translate(-5%,15%)' },
                            '50%': { transform: 'translate(-10%,5%)' },
                            '60%': { transform: 'translate(15%,0)' },
                            '70%': { transform: 'translate(0,10%)' },
                            '80%': { transform: 'translate(-15%,0)' },
                            '90%': { transform: 'translate(10%,5%)' },
                            '100%': { transform: 'translate(5%,0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #101010;
            color: #e9d5ff;
            overflow: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot { width: 8px; height: 8px; background-color: #e9d5ff; }
        .cursor-outline { width: 40px; height: 40px; border: 1px solid #7e22ce; transition: width 0.2s, height 0.2s, background-color 0.2s; }
        body.hovering .cursor-outline { width: 60px; height: 60px; background-color: rgba(126, 34, 206, 0.2); border-color: transparent; }

        /* Glitch Text */
        .glitch {
            position: relative;
            animation: glitch 3s infinite;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -1px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch 5s infinite linear alternate-reverse;
        }

        /* TV Static Background */
        .tv-noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.05;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="1"/%3E%3C/svg%3E');
            animation: noise 0.2s infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen relative">

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Background Noise -->
    <div class="tv-noise"></div>

    <div class="relative z-10 text-center p-4">
        <div class="font-mono text-xs text-sharp-purple mb-4 uppercase tracking-widest border border-sharp-purple/30 inline-block px-3 py-1 rounded-full">Error: 404_NOT_FOUND</div>
        
        <h1 class="font-syne text-[20vw] leading-[0.8] font-bold text-lavender glitch" data-text="404">404</h1>
        
        <h2 class="font-syne text-2xl md:text-4xl mt-8 mb-4">SIGNAL LOST.</h2>
        <p class="font-manrope text-lavender/60 max-w-md mx-auto mb-12">
            The page you are looking for has drifted into the void. Let's get you back to solid ground.
        </p>

        <a href="index.html" class="group inline-flex items-center gap-3 border border-lavender px-8 py-4 rounded-full text-sm font-bold uppercase hover:bg-lavender hover:text-matte-black transition-all duration-300 hover-target">
            <span>Return to Base</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:-translate-y-1 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>
    </div>

    <script>
        // Cursor Logic
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        if (!isTouchDevice) {
            let mouseX = 0, mouseY = 0, outlineX = 0, outlineY = 0;
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                cursorDot.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
            });
            const animateCursor = () => {
                outlineX += (mouseX - outlineX) * 0.15;
                outlineY += (mouseY - outlineY) * 0.15;
                cursorOutline.style.transform = `translate(${outlineX}px, ${outlineY}px) translate(-50%, -50%)`;
                requestAnimationFrame(animateCursor);
            };
            animateCursor();
            const hoverTargets = document.querySelectorAll('.hover-target');
            hoverTargets.forEach(el => {
                el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
                el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
            });
        }
    </script>
</body>
</html>
